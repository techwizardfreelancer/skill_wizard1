services:
  - type: web
    name: skill-wizard-backend
    env: node
    region: ohio
    plan: free
    buildCommand: cd server && npm install && npm run build
    startCommand: node dist/index.js
    envVars:
      - key: MONGO_URI
        sync: false
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: FRONTEND_URL
        sync: false
