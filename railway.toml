services:
  - type: web
    name: skill-wizard-backend
    runtime: node
    startCommand: node dist/index.js
    buildCommand: npm install && npm run build
    rootDirectory: server
    
  - type: mongodb
    name: skill-wizard-mongodb
    version: latest
    
envVars:
  - name: NODE_ENV
    value: production
  - name: PORT
    value: "5000"
  - name: FRONTEND_URL
    # Set this after Vercel deployment
    value: https://skill-wizard.vercel.app
